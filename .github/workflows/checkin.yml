name: NodeLoc 每日签到

on:
  schedule:
    # UTC 17:00 = 北京时间(UTC+8) 次日 01:00
    - cron: '0 17 * * *'
  workflow_dispatch: {}

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: 执行签到脚本
        env:
          NODELOC_USER: ${{ secrets.NODELOC_USER }}
          NODELOC_PASS: ${{ secrets.NODELOC_PASS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node scripts/checkin.js

      - name: 上传调试截图（便于排查问题）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-debug-${{ github.run_id }}
          path: debug/
          retention-days: 3
          if-no-files-found: ignore
